openapi: 3.1.0
info:
  title: FastLock API
  version: 1.1.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: |
    API REST do FastLock com multi-tenancy por organizacao.
    Usuarios autenticam via Supabase Auth, sao espelhados em public.app_users
    e recebem autorizacao por organization_memberships.
servers:
  - url: http://127.0.0.1:3333
    description: Local development
tags:
  - name: Health
    description: Operational API checks.
  - name: Identity
    description: Authenticated user context and membership discovery.
  - name: Organizations
    description: Tenant provisioning and organization metadata.
  - name: Memberships
    description: User access assignments inside organizations.
  - name: Lockers
    description: Locker catalog and operational status.
  - name: Rentals
    description: Rental creation and lookup.
  - name: Unlock
    description: Access code validation and unlock events.
  - name: Dashboard
    description: Platform and organization metrics.
security: []
paths:
  /api/health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Check API health
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/me:
    get:
      tags: [Identity]
      operationId: getMe
      summary: Get the current authenticated user and memberships
      security:
        - SupabaseBearer: []
      responses:
        "200":
          description: Current user context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/organizations:
    get:
      tags: [Organizations]
      operationId: listOrganizations
      summary: List organizations visible to the current actor
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/OrganizationStatus"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated organizations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Organizations]
      operationId: createOrganization
      summary: Create an organization
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/organizations/{organizationId}:
    get:
      tags: [Organizations]
      operationId: getOrganization
      summary: Get an organization
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "200":
          description: Organization found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/organizations/{organizationId}/memberships:
    get:
      tags: [Memberships]
      operationId: listOrganizationMemberships
      summary: List memberships in an organization
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - name: role
          in: query
          schema:
            $ref: "#/components/schemas/OrganizationMembershipRole"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/OrganizationMembershipStatus"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated memberships
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembershipList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Memberships]
      operationId: createOrganizationMembership
      summary: Create or upsert a membership in an organization
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationMembershipRequest"
      responses:
        "201":
          description: Membership created or updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembership"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/organizations/{organizationId}/memberships/{membershipId}:
    patch:
      tags: [Memberships]
      operationId: updateOrganizationMembership
      summary: Update a membership role or status
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/MembershipId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationMembershipRequest"
      responses:
        "200":
          description: Membership updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationMembership"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/lockers:
    get:
      tags: [Lockers]
      operationId: listPublicLockers
      summary: List lockers for a public organization context
      parameters:
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/LockerStatus"
        - name: size
          in: query
          schema:
            $ref: "#/components/schemas/LockerSize"
        - name: location_id
          in: query
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated locker list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockerList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/lockers/{id}/public-context:
    get:
      tags: [Lockers]
      operationId: getPublicLockerContext
      summary: Resolve the public QR context for a locker
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Public locker context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicLockerContext"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/organizations/{organizationId}/lockers:
    get:
      tags: [Lockers]
      operationId: listOrganizationLockers
      summary: List lockers in an organization
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/LockerStatus"
        - name: size
          in: query
          schema:
            $ref: "#/components/schemas/LockerSize"
        - name: location_id
          in: query
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated locker list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockerList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Lockers]
      operationId: createOrganizationLocker
      summary: Create a locker inside an organization
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLockerRequest"
      responses:
        "201":
          description: Locker created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Locker"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/organizations/{organizationId}/lockers/{id}:
    patch:
      tags: [Lockers]
      operationId: updateOrganizationLocker
      summary: Update a locker in an organization
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLockerRequest"
      responses:
        "200":
          description: Locker updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Locker"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/locations:
    get:
      tags: [Locations]
      operationId: listPublicLocations
      summary: List public locker locations with live availability
      parameters:
        - name: organization_id
          in: query
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated public location list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicLockerLocationList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/organizations/{organizationId}/locations:
    get:
      tags: [Locations]
      operationId: listOrganizationLocations
      summary: List locations inside an organization
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Paginated organization location list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockerLocationList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    post:
      tags: [Locations]
      operationId: createOrganizationLocation
      summary: Create a location inside an organization
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLocationRequest"
      responses:
        "201":
          description: Location created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockerLocationWithStats"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/organizations/{organizationId}/locations/{id}:
    patch:
      tags: [Locations]
      operationId: updateOrganizationLocation
      summary: Update a location inside an organization
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLocationRequest"
      responses:
        "200":
          description: Location updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LockerLocationWithStats"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
    delete:
      tags: [Locations]
      operationId: deleteOrganizationLocation
      summary: Delete a location inside an organization
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/Id"
      responses:
        "204":
          description: Location deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/rentals:
    post:
      tags: [Rentals]
      operationId: createRental
      summary: Create a rental
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRentalRequest"
      responses:
        "201":
          description: Rental created and locker occupied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rental"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/rentals/{id}:
    get:
      tags: [Rentals]
      operationId: getRental
      summary: Get a rental
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Rental found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalWithLocker"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/rentals/{id}/webauthn/registration-options:
    post:
      tags: [Rentals]
      operationId: createRentalRegistrationOptions
      summary: Create WebAuthn registration options for a rental
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Registration options generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAuthnOptions"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/rentals/{id}/webauthn/registrations:
    post:
      tags: [Rentals]
      operationId: completeRentalRegistration
      summary: Verify and persist a rental WebAuthn credential
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebAuthnRegistrationRequest"
      responses:
        "200":
          description: Credential registered and rental moved to storing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rental"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/rentals/{id}/webauthn/authentication-options:
    post:
      tags: [Rentals]
      operationId: createRentalAuthenticationOptions
      summary: Create WebAuthn authentication options for a rental
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Authentication options generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebAuthnOptions"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/rentals/{id}/retrieve:
    post:
      tags: [Rentals]
      operationId: retrieveRentalLocker
      summary: Authenticate with WebAuthn and calculate retrieval charges
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebAuthnAuthenticationRequest"
      responses:
        "200":
          description: Retrieval calculated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrievalResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/rentals/{id}/confirm-retrieval:
    post:
      tags: [Rentals]
      operationId: confirmRentalRetrieval
      summary: Confirm payment and finish a rental
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Rental finished and locker released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rental"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/organizations/{organizationId}/rentals/{id}/override-release:
    post:
      tags: [Rentals]
      operationId: overrideReleaseRental
      summary: Cancel and release a live rental operationally
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OverrideReleaseRequest"
      responses:
        "200":
          description: Rental cancelled and locker released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rental"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/unlock-events:
    post:
      tags: [Unlock]
      operationId: createUnlockEvent
      summary: Create an unlock event from an access code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnlockRequest"
      responses:
        "200":
          description: Locker opened and rental finished
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnlockResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/platform/dashboard:
    get:
      tags: [Dashboard]
      operationId: getPlatformDashboard
      summary: Get platform-wide dashboard metrics
      security:
        - AdminApiKey: []
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/dashboard:
    get:
      tags: [Dashboard]
      operationId: getPlatformDashboardLegacy
      deprecated: true
      summary: Legacy alias for the platform dashboard
      security:
        - AdminApiKey: []
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"
  /api/organizations/{organizationId}/dashboard:
    get:
      tags: [Dashboard]
      operationId: getOrganizationDashboard
      summary: Get dashboard metrics for one organization
      security:
        - SupabaseBearer: []
        - AdminApiKey: []
      parameters:
        - $ref: "#/components/parameters/OrganizationId"
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationDashboard"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"
components:
  securitySchemes:
    AdminApiKey:
      type: apiKey
      in: header
      name: x-admin-api-key
      description: Administrative API key for platform-level operations.
    SupabaseBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Supabase Auth access token. The backend syncs the user into app_users and resolves access by organization_memberships.
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrganizationId:
      name: organizationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MembershipId:
      name: membershipId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Forbidden:
      description: Authenticated user does not have the required permissions
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    Conflict:
      description: Request conflicts with current state
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    LockerSize:
      type: string
      enum: [P, M, G]
    LockerStatus:
      type: string
      enum: [free, occupied, maintenance]
    RentalStatus:
      type: string
      enum: [active, storing, pending_retrieval_payment, finished, cancelled]
    OrganizationStatus:
      type: string
      enum: [active, inactive]
    OrganizationMembershipRole:
      type: string
      enum: [owner, admin, viewer]
    OrganizationMembershipStatus:
      type: string
      enum: [invited, active, disabled]
    Pagination:
      type: object
      required: [limit, offset, total, has_more]
      properties:
        limit: { type: integer, minimum: 1 }
        offset: { type: integer, minimum: 0 }
        total: { type: integer, minimum: 0 }
        has_more: { type: boolean }
    AppUser:
      type: object
      required: [id, email, full_name, avatar_url, last_sign_in_at, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        email:
          anyOf:
            - type: string
              format: email
            - type: "null"
        full_name:
          anyOf:
            - type: string
            - type: "null"
        avatar_url:
          anyOf:
            - type: string
            - type: "null"
        last_sign_in_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CurrentOrganizationMembership:
      type: object
      required: [id, role, status]
      properties:
        id: { type: string, format: uuid }
        role: { $ref: "#/components/schemas/OrganizationMembershipRole" }
        status: { $ref: "#/components/schemas/OrganizationMembershipStatus" }
    Organization:
      type: object
      required: [id, name, slug, status, created_by_user_id, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        status: { $ref: "#/components/schemas/OrganizationStatus" }
        created_by_user_id:
          anyOf:
            - type: string
              format: uuid
            - type: "null"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        current_membership:
          anyOf:
            - $ref: "#/components/schemas/CurrentOrganizationMembership"
            - type: "null"
    OrganizationList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Organization"
        pagination:
          $ref: "#/components/schemas/Pagination"
    CreateOrganizationRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        slug:
          type: string
          minLength: 2
          maxLength: 120
          pattern: "^[a-z0-9-]+$"
        owner_user_id:
          type: string
          format: uuid
        owner_email:
          type: string
          format: email
    OrganizationMembership:
      type: object
      required:
        - id
        - organization_id
        - user_id
        - invite_email
        - role
        - status
        - created_by_user_id
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        user_id:
          anyOf:
            - type: string
              format: uuid
            - type: "null"
        invite_email:
          anyOf:
            - type: string
              format: email
            - type: "null"
        role: { $ref: "#/components/schemas/OrganizationMembershipRole" }
        status: { $ref: "#/components/schemas/OrganizationMembershipStatus" }
        created_by_user_id:
          anyOf:
            - type: string
              format: uuid
            - type: "null"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        organization:
          anyOf:
            - $ref: "#/components/schemas/Organization"
            - type: "null"
        user:
          anyOf:
            - $ref: "#/components/schemas/AppUser"
            - type: "null"
    OrganizationMembershipList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationMembership"
        pagination:
          $ref: "#/components/schemas/Pagination"
    CreateOrganizationMembershipRequest:
      type: object
      required: [role]
      additionalProperties: false
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/OrganizationMembershipRole"
      oneOf:
        - required: [user_id]
        - required: [email]
    UpdateOrganizationMembershipRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        role:
          $ref: "#/components/schemas/OrganizationMembershipRole"
        status:
          type: string
          enum: [active, disabled]
    MeResponse:
      type: object
      required: [user, memberships]
      properties:
        user:
          anyOf:
            - $ref: "#/components/schemas/AppUser"
            - type: "null"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/OrganizationMembership"
    LocationLockerPreview:
      type: object
      required: [id, code, size]
      properties:
        id: { type: string, format: uuid }
        code: { type: string, example: LCK-001 }
        size: { $ref: "#/components/schemas/LockerSize" }
    LockerLocation:
      type: object
      required: [id, organization_id, name, address, latitude, longitude, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        name: { type: string, example: "Estacao da Se" }
        address: { type: string, example: "Praca da Se, Se, Sao Paulo - SP" }
        latitude: { type: number, example: -23.55052 }
        longitude: { type: number, example: -46.633308 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    LockerLocationWithStats:
      allOf:
        - $ref: "#/components/schemas/LockerLocation"
        - type: object
          required: [total_lockers, free_lockers]
          properties:
            total_lockers: { type: integer, minimum: 0 }
            free_lockers: { type: integer, minimum: 0 }
    PublicLockerLocation:
      allOf:
        - $ref: "#/components/schemas/LockerLocationWithStats"
        - type: object
          required: [available_lockers]
          properties:
            available_lockers:
              type: array
              items:
                $ref: "#/components/schemas/LocationLockerPreview"
    LockerLocationList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/LockerLocationWithStats"
        pagination:
          $ref: "#/components/schemas/Pagination"
    PublicLockerLocationList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PublicLockerLocation"
        pagination:
          $ref: "#/components/schemas/Pagination"
    CreateLocationRequest:
      type: object
      required: [name, address, latitude, longitude]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        address:
          type: string
          minLength: 5
          maxLength: 255
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
    UpdateLocationRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        address:
          type: string
          minLength: 5
          maxLength: 255
        latitude:
          type: number
          minimum: -90
          maximum: 90
        longitude:
          type: number
          minimum: -180
          maximum: 180
    Locker:
      type: object
      required: [id, organization_id, location_id, code, size, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        location_id:
          anyOf:
            - type: string
              format: uuid
            - type: "null"
        code: { type: string, example: LCK-001 }
        size: { $ref: "#/components/schemas/LockerSize" }
        status: { $ref: "#/components/schemas/LockerStatus" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    LockerList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Locker"
        pagination:
          $ref: "#/components/schemas/Pagination"
    PublicLockerContextActiveRental:
      type: object
      required:
        - id
        - status
        - started_at
        - unlocked_at
        - retrieved_at
        - initial_fee_cents
        - hourly_rate_cents
        - extra_charge_cents
        - total_cents
        - can_authenticate
      properties:
        id:
          anyOf:
            - type: string
              format: uuid
            - type: "null"
        status:
          type: string
          enum: [active, storing, pending_retrieval_payment]
        started_at: { type: string, format: date-time }
        unlocked_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        retrieved_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        initial_fee_cents: { type: integer, minimum: 0 }
        hourly_rate_cents: { type: integer, minimum: 0 }
        extra_charge_cents: { type: integer, minimum: 0 }
        total_cents: { type: integer, minimum: 0 }
        can_authenticate: { type: boolean }
    PublicLockerContext:
      type: object
      required: [mode, locker, location_name, location_address, initial_fee_cents, hourly_rate_cents, active_rental]
      properties:
        mode:
          type: string
          enum: [rent, retrieve, maintenance]
        locker:
          $ref: "#/components/schemas/Locker"
        location_name:
          anyOf:
            - type: string
            - type: "null"
        location_address:
          anyOf:
            - type: string
            - type: "null"
        initial_fee_cents: { type: integer, minimum: 0 }
        hourly_rate_cents: { type: integer, minimum: 0 }
        active_rental:
          anyOf:
            - $ref: "#/components/schemas/PublicLockerContextActiveRental"
            - type: "null"
    CreateLockerRequest:
      type: object
      required: [code, size]
      additionalProperties: false
      properties:
        code:
          type: string
          minLength: 3
          maxLength: 32
          pattern: "^[A-Z0-9-]+$"
        size:
          $ref: "#/components/schemas/LockerSize"
        location_id:
          anyOf:
            - type: string
              format: uuid
            - type: "null"
    UpdateLockerRequest:
      type: object
      minProperties: 1
      additionalProperties: false
      properties:
        code:
          type: string
          minLength: 3
          maxLength: 32
          pattern: "^[A-Z0-9-]+$"
        size:
          $ref: "#/components/schemas/LockerSize"
        status:
          $ref: "#/components/schemas/LockerStatus"
        location_id:
          anyOf:
            - type: string
              format: uuid
            - type: "null"
    Rental:
      type: object
      required:
        - id
        - organization_id
        - locker_id
        - access_code
        - status
        - initial_fee_cents
        - hourly_rate_cents
        - extra_charge_cents
        - total_cents
        - started_at
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        organization_id: { type: string, format: uuid }
        locker_id: { type: string, format: uuid }
        access_code:
          type: string
          pattern: "^[0-9]{6}$"
        status:
          $ref: "#/components/schemas/RentalStatus"
        initial_fee_cents: { type: integer, minimum: 0 }
        hourly_rate_cents: { type: integer, minimum: 0 }
        started_at: { type: string, format: date-time }
        unlocked_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        retrieved_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        finished_at:
          anyOf:
            - type: string
              format: date-time
            - type: "null"
        extra_charge_cents: { type: integer, minimum: 0 }
        total_cents: { type: integer, minimum: 0 }
        elapsed_seconds:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    RentalWithLocker:
      allOf:
        - $ref: "#/components/schemas/Rental"
        - type: object
          required: [locker]
          properties:
            locker:
              $ref: "#/components/schemas/Locker"
    CreateRentalRequest:
      type: object
      required: [locker_id]
      additionalProperties: false
      properties:
        locker_id:
          type: string
          format: uuid
    WebAuthnOptions:
      type: object
      required: [challenge, timeout]
      properties:
        challenge: { type: string }
        timeout: { type: integer, minimum: 1 }
      additionalProperties: true
    WebAuthnRegistrationCredential:
      type: object
      required: [id, rawId, type, response]
      properties:
        id: { type: string }
        rawId: { type: string }
        type: { type: string, const: "public-key" }
        authenticatorAttachment:
          anyOf:
            - type: string
            - type: "null"
        response:
          type: object
          required: [clientDataJSON, attestationObject]
          properties:
            clientDataJSON: { type: string }
            attestationObject: { type: string }
            transports:
              type: array
              items: { type: string }
          additionalProperties: true
        clientExtensionResults:
          type: object
          additionalProperties: true
      additionalProperties: true
    WebAuthnAuthenticationCredential:
      type: object
      required: [id, rawId, type, response]
      properties:
        id: { type: string }
        rawId: { type: string }
        type: { type: string, const: "public-key" }
        authenticatorAttachment:
          anyOf:
            - type: string
            - type: "null"
        response:
          type: object
          required: [clientDataJSON, authenticatorData, signature]
          properties:
            clientDataJSON: { type: string }
            authenticatorData: { type: string }
            signature: { type: string }
            userHandle:
              anyOf:
                - type: string
                - type: "null"
          additionalProperties: true
        clientExtensionResults:
          type: object
          additionalProperties: true
      additionalProperties: true
    WebAuthnRegistrationRequest:
      type: object
      required: [credential]
      additionalProperties: false
      properties:
        credential:
          $ref: "#/components/schemas/WebAuthnRegistrationCredential"
    WebAuthnAuthenticationRequest:
      type: object
      required: [credential]
      additionalProperties: false
      properties:
        credential:
          $ref: "#/components/schemas/WebAuthnAuthenticationCredential"
    RetrievalResult:
      type: object
      required: [rental_id, locker_id, minutes_used, extra_charge_cents, total_cents, payment_required]
      properties:
        rental_id: { type: string, format: uuid }
        locker_id: { type: string, format: uuid }
        minutes_used: { type: integer, minimum: 0 }
        extra_charge_cents: { type: integer, minimum: 0 }
        total_cents: { type: integer, minimum: 0 }
        payment_required: { type: boolean }
    OverrideReleaseRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 8
          maxLength: 500
    UnlockRequest:
      type: object
      required: [access_code]
      additionalProperties: false
      properties:
        access_code:
          type: string
          pattern: "^[0-9]{6}$"
    UnlockResponse:
      type: object
      required: [message, rental_id, locker_id]
      properties:
        message:
          type: string
          const: Locker aberto
        rental_id:
          type: string
          format: uuid
        locker_id:
          type: string
          format: uuid
    DashboardMetrics:
      type: object
      required:
        - total_lockers
        - free_lockers
        - occupied_lockers
        - maintenance_lockers
        - active_rentals
        - finished_rentals
        - total_rentals
        - successful_unlocks
        - failed_unlocks
      properties:
        total_lockers: { type: integer, minimum: 0 }
        free_lockers: { type: integer, minimum: 0 }
        occupied_lockers: { type: integer, minimum: 0 }
        maintenance_lockers: { type: integer, minimum: 0 }
        active_rentals: { type: integer, minimum: 0 }
        finished_rentals: { type: integer, minimum: 0 }
        total_rentals: { type: integer, minimum: 0 }
        successful_unlocks: { type: integer, minimum: 0 }
        failed_unlocks: { type: integer, minimum: 0 }
    DashboardLockerPreview:
      type: object
      required:
        - id
        - code
        - size
        - status
        - location_id
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        size:
          type: string
          enum: [P, M, G]
        status:
          type: string
          enum: [free, occupied, maintenance]
        location_id:
          oneOf:
            - type: string
              format: uuid
            - type: "null"
    OrganizationDashboard:
      allOf:
        - $ref: "#/components/schemas/DashboardMetrics"
        - type: object
          required:
            - lockers_preview
          properties:
            lockers_preview:
              type: array
              items:
                $ref: "#/components/schemas/DashboardLockerPreview"
    Problem:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
